<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpeakWell — Speech Coach</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>SpeakWell</h1>
      <p class="tagline">Speak. Reflect. Improve.</p>
    </header>

    <div class="mode-switch" id="modeSwitch" role="tablist" aria-label="Mode">
      <span class="mode-thumb" aria-hidden="true"></span>
      <button type="button" class="mode-option is-active" data-mode="practice" role="tab" aria-selected="true">Practice</button>
      <button type="button" class="mode-option" data-mode="interview" role="tab" aria-selected="false">Mock interview</button>
    </div>

    <section class="context-bar" id="contextBar">
      <label for="contextSelect" class="prompt-label">Who are you / what's your goal? (optional)</label>
      <select id="contextSelect" class="context-select">
        <option value="">No specific context</option>
        <option value="Giving a presentation or speaking in public">Presentations &amp; public speaking</option>
        <option value="Communicating in meetings and at work">Meetings &amp; workplace communication</option>
        <option value="Selling, pitching, or persuading an audience">Sales, pitching &amp; persuading</option>
        <option value="Teaching, training, or explaining something to others">Teaching, training &amp; explaining</option>
        <option value="Speaking on camera for a podcast, video, or media">On camera — podcasts / video / media</option>
        <option value="Improving everyday social conversations">Everyday social conversations</option>
        <option value="Speaking confidently while dating and making connections">Dating &amp; making connections</option>
        <option value="Practicing speaking English as a second language">English as a second language</option>
        <option value="">Other — describe below ↓</option>
      </select>
      <textarea id="contextDetail" class="prompt-input" rows="2"
        placeholder="Add specifics (optional), e.g. ‘I get nervous and talk too fast in interviews.’"></textarea>
    </section>

    <section class="context-bar" id="interviewContext" hidden>
      <label for="roleSelect" class="prompt-label">What are you interviewing for?</label>
      <select id="roleSelect" class="context-select">
        <option value="">No specific role</option>
        <option value="an internship">Internship</option>
        <option value="an entry-level / new-grad role">Entry-level / new grad</option>
        <option value="a software engineer role">Software engineer</option>
        <option value="a senior software engineer role">Senior software engineer</option>
        <option value="a product manager role">Product manager</option>
        <option value="a data analyst or data scientist role">Data analyst / scientist</option>
        <option value="a UX / UI designer role">Designer (UX / UI)</option>
        <option value="a marketing role">Marketing</option>
        <option value="a sales role">Sales</option>
        <option value="a customer success or support role">Customer success / support</option>
        <option value="a management consulting role (case interview)">Consulting (case interview)</option>
        <option value="a finance or accounting role">Finance / accounting</option>
        <option value="a management or leadership role">Manager / leadership</option>
        <option value="a nursing or healthcare role">Nurse / healthcare</option>
        <option value="a teaching or education role">Teacher / education</option>
        <option value="graduate school or university admission">Grad school / university admission</option>
        <option value="a club or student organization">Club / student organization</option>
        <option value="">Other — describe below ↓</option>
      </select>
      <textarea id="roleDetail" class="prompt-input" rows="2"
        placeholder="Specific role you're interviewing for (optional), e.g. ‘Senior Frontend Engineer at a fintech startup’"></textarea>
    </section>

    <section class="prompt-bar">
      <label for="promptInput" class="prompt-label" id="promptLabel">Your speaking prompt (optional)</label>
      <textarea id="promptInput" class="prompt-input" rows="2"
        placeholder="Type your own prompt to speak about, or click ‘Give me a prompt’…"></textarea>
      <button id="promptBtn" class="secondary">Give me a prompt</button>
    </section>

    <section class="recorder">
      <button id="recordBtn" class="record">● Record</button>
      <span id="timer" class="timer">0:00</span>
    </section>

    <p id="status" class="status" role="status"></p>

    <section id="results" class="results" hidden>
      <div id="recordingCard" class="recording-card" hidden>
        <div class="recording-title">Your recording</div>
        <audio id="player" class="player" controls></audio>
        <div id="pace" class="pace" hidden></div>
      </div>
      <div class="scores" id="scores"></div>
      <div id="interviewCard" class="interview-card" hidden>
        <h2>Interview answer</h2>
        <div class="interview-sub">How you answered</div>
        <p id="answerCritique" class="feedback"></p>
        <div class="interview-sub">A stronger answer</div>
        <p id="modelAnswer" class="feedback"></p>
      </div>
      <h2>Transcript</h2>
      <p id="transcript" class="transcript"></p>
      <h2>Coaching feedback</h2>
      <p id="feedback" class="feedback"></p>
      <h2>How to improve</h2>
      <ul id="tips" class="tips"></ul>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
